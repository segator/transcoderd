name: Build and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: docker/setup-buildx-action@v3

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Install Dagger
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR=/usr/local/bin sudo sh

      - name: Release please
        if: github.event_name != 'pull_request'
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Set release version
        if: steps.release.outputs.release_created
        run: echo "PROJECT_VERSION=v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: mage test

      - name: Ensure builder images exist
        run: |
          for target in builder-ffmpeg builder-pgs; do
            if ! docker manifest inspect ghcr.io/segator/transcoderd:${target} > /dev/null 2>&1; then
              echo "Image ${target} not found, building and pushing..."
              if [ "$target" = "builder-ffmpeg" ]; then mage publishBuilderFfmpeg; else mage publishBuilderPgs; fi
            else
              echo "Image ${target} already exists, skipping."
            fi
          done

      - name: Build
        run: mage build

      - name: Build Containers
        run: mage container

      - name: E2E Test
        run: mage testE2E

      - name: Publish
        if: github.event_name != 'pull_request'
        run: mage publish

      - name: Publish release tags
        if: steps.release.outputs.release_created
        run: |
          PROJECT_VERSION=v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} mage publish
          PROJECT_VERSION=v${{ steps.release.outputs.major }} mage publish

      - name: Upload release assets
        if: steps.release.outputs.release_created
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} ./dist/* --clobber
