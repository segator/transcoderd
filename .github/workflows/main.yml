name: Build and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      _EXPERIMENTAL_DAGGER_CACHE_CONFIG: type=registry,ref=ghcr.io/segator/transcoderd:dagger-cache,mode=max
      _EXPERIMENTAL_DAGGER_SHUTDOWN_TIMEOUT: 180s
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: docker/setup-buildx-action@v3

      - name: Release please
        if: github.event_name != 'pull_request'
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Set release version
        if: steps.release.outputs.release_created
        run: echo "PROJECT_VERSION=v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: mage test:unit

      - name: Build
        run: mage build:all

      - name: Build Containers
        run: mage docker:all

      - name: E2E Test
        run: mage test:e2e

      - name: Publish
        if: github.event_name != 'pull_request'
        run: mage publish:app

      - name: Publish release tags
        if: steps.release.outputs.release_created
        run: |
          PROJECT_VERSION=v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} mage publish:app
          PROJECT_VERSION=v${{ steps.release.outputs.major }} mage publish:app

      - name: Upload release assets
        if: steps.release.outputs.release_created
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} ./dist/* --clobber
