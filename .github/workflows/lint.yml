name: golangci-lint
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read
  checks: write
  packages: write

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    env:
      _EXPERIMENTAL_DAGGER_CACHE_CONFIG: type=registry,ref=ghcr.io/segator/transcoderd:dagger-cache-lint,mode=max
      _EXPERIMENTAL_DAGGER_SHUTDOWN_TIMEOUT: 180s
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: mage lint:check
